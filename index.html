<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedInfo AI – Medicine Info Helper</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top left,#4f46e5,#111827);
color:#f9fafb;
}

.app-wrapper{
width:100%;
max-width:900px;
padding:24px;
}

.card{
background:rgba(17,24,39,0.92);
border-radius:20px;
padding:24px;
box-shadow:0 25px 50px -12px rgba(0,0,0,0.7);
backdrop-filter:blur(18px);
}

.title{
font-size:1.6rem;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
font-size:0.9rem;
color:#9ca3af;
margin-bottom:18px;
}

.input-row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.input-row input{
flex:1;
padding:10px 12px;
border-radius:999px;
border:1px solid rgba(156,163,175,0.7);
background:#1f2937;
color:#fff;
outline:none;
}

.input-row button{
padding:10px 18px;
border-radius:999px;
border:none;
cursor:pointer;
background:linear-gradient(135deg,#6366f1,#ec4899);
color:white;
font-weight:600;
}

.output-card{
margin-top:20px;
border-radius:18px;
padding:16px;
background:#020617;
border:1px solid #374151;
min-height:120px;
}

.output-title{
font-size:0.9rem;
letter-spacing:1px;
color:#9ca3af;
margin-bottom:8px;
}

.output-body{
white-space:pre-wrap;
line-height:1.5;
}

.error{
color:#fecaca;
}

.disclaimer{
margin-top:12px;
font-size:0.75rem;
color:#fbbf24;
}
</style>
</head>

<body>

<div class="app-wrapper">
<div class="card">

<h1 class="title">MedInfo AI</h1>
<p class="subtitle">
Type a medicine name to get AI-generated general information.
</p>

<div class="input-row">
<input id="medicine-input" placeholder="e.g. paracetamol, ibuprofen" />
<button id="search-btn">Ask AI</button>
</div>

<div class="output-card">
<div class="output-title">AI Response</div>
<div id="output" class="output-body">
Enter a medicine name above.
</div>

<p class="disclaimer">
⚠ This tool is for learning only and not medical advice.
</p>
</div>

</div>
</div>

<script>

const HF_API_KEY = process.env.HF_API_KEY;
const HF_MODEL = "Qwen/Qwen2.5-7B-Instruct";

const API_URL = "https://router.huggingface.co/v1/chat/completions";

const input = document.getElementById("medicine-input");
const button = document.getElementById("search-btn");
const output = document.getElementById("output");

async function fetchMedicineInfo(name){

if(!name.trim()){
output.textContent="Please enter a medicine name.";
return;
}

output.textContent="Generating response...";

try{

const prompt = `
Provide simple educational information about the medicine "${name}".

Include:

• What the medicine is
• Common uses
• Available forms
• Common side effects

Do NOT give medical advice or dosage.

End with:
"Always consult a doctor or pharmacist before taking any medicine."
`;

const response = await fetch(API_URL,{
method:"POST",
headers:{
"Authorization":`Bearer ${HF_API_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:HF_MODEL,
messages:[
{
role:"system",
content:"You are a helpful medical information assistant."
},
{
role:"user",
content:prompt
}
],
max_tokens:200,
temperature:0.7
})
});

if(!response.ok){
throw new Error("API request failed");
}

const result = await response.json();

let text="";

if(result && result.choices && result.choices.length>0){

const choice=result.choices[0];

if(choice.message && choice.message.content){
text=choice.message.content;
}

else if(choice.text){
text=choice.text;
}

}

if(!text){
text="No response generated.";
}

output.textContent=text.trim();

}catch(err){

console.error(err);

output.classList.add("error");

output.textContent=
"Error calling AI model. Check API key and model.";

}

}

button.onclick=()=>fetchMedicineInfo(input.value);

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
fetchMedicineInfo(input.value);
}
});

</script>

</body>
</html>
